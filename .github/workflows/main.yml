name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  linting:
    name: Static linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ">=22.22.0"

      - name: Install NPM dependencies
        run: npm install

      - name: ESLint
        run: npm run eslint:ci

      - name: Prettier
        run: npm run prettier:ci

  tests:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ">=22.22.0"

      - name: Install NPM dependencies
        run: npm install

      - name: Tests
        run: npm run test
